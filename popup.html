<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PageTalk</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-top">
      <h1 class="logo">Page<span>Talk</span></h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">&#9881;</button>
    </div>
    <div class="url-display" id="urlDisplay" title=""></div>
  </header>
  <div id="settingsPanel" class="settings-panel hidden">
    <h3>Settings</h3>
    <label for="displayNameInput">Display Name</label>
    <input type="text" id="displayNameInput" placeholder="Anonymous" maxlength="30" autocomplete="off">
    <button id="saveSettings" class="btn-primary">Save</button>
  </div>
  <div id="threadInfo" class="thread-info hidden">
    <span id="commentCount" class="comment-count">0 comments</span>
    <div class="sort-buttons" role="group" aria-label="Sort comments">
      <button class="sort-btn active" data-sort="hot">Hot</button>
      <button class="sort-btn" data-sort="new">New</button>
      <button class="sort-btn" data-sort="top">Top</button>
    </div>
  </div>
  <div id="loading" class="state-view"><div class="spinner"></div><p>Loading discussion&hellip;</p></div>
  <div id="errorState" class="state-view hidden">
    <div class="state-icon">&#9888;</div>
    <p id="errorMessage">Something went wrong.</p>
    <button id="retryBtn" class="btn-secondary">Retry</button>
  </div>
  <div id="mainContent" class="main-content hidden">
    <div class="composer">
      <textarea id="commentInput" placeholder="Share your thoughts about this page&#8230;" rows="3" maxlength="5000" aria-label="Write a comment"></textarea>
      <div class="composer-footer">
        <span id="charCount" class="char-count">0 / 5000</span>
        <button id="submitComment" class="btn-primary">Post Comment</button>
      </div>
    </div>
    <div id="commentsList" class="comments-list">
      <div id="commentsContainer"></div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">&#128172;</div>
        <p>No comments yet.</p>
        <p class="empty-sub">Be the first to start the discussion!</p>
      </div>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script src="utils.js"></script>
<script src="api.js"></script>
<script src="popup.js"></script>
</body>
</html>
